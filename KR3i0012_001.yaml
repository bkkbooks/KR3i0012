body:
  text: 墨史卷上元陸友撰魏韋誕字仲將京兆人太僕端之子善隸楷魏太和中為武都太守以能書留補侍中洛陽許鄴三都宫觀始就詔令誕題署以為永制給御筆墨皆不任用因奏蔡雍自矜能書兼斯喜之法非紈素不妄下筆夫欲善其事必利其器若用張芝筆左伯紙及臣墨兼此三具又得臣手然後可以逞徑丈之勢方寸千言誕仕至光祿大夫嘉平三年卒年七十五蕭子良答王僧䖍書曰仲將之墨一㸃如漆後魏賈思協齊民要術有韋仲將筆方合墨法朝說之墨經並舉魏仲將墨法後魏賈思協法二法本無大異而朝氏兩書之又蘇易簡文房四譜載冀公墨法其人未詳晉張金者晉人石崇奴劵云張金好墨過市數蠡并市豪筆備即寫書又吳俶墨賦云或名重張金或妙稱祖氏宋張永字景雲吳郡吳人裕之子仕宋至征西將軍涉獵書史能為文章善隸書又有巧思並為文帝所知紙墨皆自營造帝每得永表啓輒執玩咨嗟自嘆供御者了不及也又詔永更製御紙緊潔光麗耀目奪日又合祕墨美殊前後色如㸃漆一㸃竟紙何薳記墨云近世士人游戲翰墨因其資地高韻創意出竒如韋仲將張永所製者故自不少然不皆手製亦以意加減指授善工而為之耳如東坡先生在儋耳令潘衡所造銘曰海南松煤東坡法墨者是也又云賀方回張秉道康為章皆能精究和膠之妙法其製皆如出犀璧也又如李元伯李公照王仲達武繼隆滕元發邵興宗之徒往往作墨然都成於匠手而假名耳因附著之不復别見云唐李陽冰趙郡人官至將作大匠善小篆父雍門湖城令冰兄弟五人皆負詞學初師李斯嶧山碑後見仲尼吳季札墓志便變化開闔如虎如龍徑利豪爽風行雨集文字之本悉在心胸自言斯篆之後直至小生曹喜蔡雍不足數識者謂之倉頡後身尤精小學豪駿墨徑時謂之筆虎勢如古叉倚物力有萬夫無與為比周越云陽冰篆勢全法崔子玉張平子碑不因見夫子書便變化開闔蓋竇臮之抑斷也宋元符間襄陽米芾逰京師於相國寺羅漢院僧壽許見陽冰供御墨一巨挺其制如碑高逾尺而厚二寸面蹙犀文堅澤如玉有篆欵曰文華閣中穴一竅下畫泰卦於麒麟之上幕篆五字曰翠霞曰臣陽冰左行書大厯二年二月造得旨降入翻經院右行書董作內府丞臣車輔都監臣趙忠孠芾後數載經南徐過鶴林僧惟清乞書寶藏額因難之清忽開笥取古錦囊出巨墨如曩時所見者且云先師昔在京師貴人家以古琴玉環貿得之乃奉墨授芾芾受而書畢亟歸淨名齊報之以吳道子畫熾盛光佛一幀古銅水龜玉界尺二芾後書儒釋老書及忠孝賢明事則用之祖敏本易定人唐時之墨官也今墨之上必假其姓而號之大約易水者為上其妙者必以鹿角膠煎為膏而和之故祖氏之名聞於天下朝氏云古人用墨多自製造故匠氏不顯唐之匠氏惟聞祖敏黃秉云祖氏易水人故以濟土為號年載已逺罕有存者友按唐書地理志易州土貢墨意當時治墨者不特祖氏其後奚李張陳皆出易水製作之盛有由來矣王君德者唐末人蔡君謨云世有王君德墨人間少得之皆出上方或有得者是為家寶也墨經有唐王君德搗用石臼搗三二千杵其藥用酢石榴皮水牛角屑膽礬三物又法用梣木皮皂角膽礬馬鞭草四物奚鼐奚冪已上二人唐末匠氏鼐墨面曰光慶又印曰奚鼐墨又印曰庚申而冪墨大槩與鼐同惟庚申字異見墨經及趙寅墨譜奚庭圭易水人或曰李庭圭本姓奚江南賜姓李氏非也今之人但見有奚庭圭墨二品庭圭父即超何獨有奚庭圭而無奚超也趙寅達夫嘗收得一種上印文曰宣府奚庭圭乃知居歙者李氏籍宣者奚氏各是一族而名偶同耳新安志云自蔡居謨以來皆言李庭圭即奚庭圭唯黃秉李孝美云奚墨不及李友按墨經云觀易水奚氏歙州李氏皆用大膠所以養墨又云奚鼐之子超冪之子起而别叙歙州李超超子庭圭以下世家是族有奚李之異居有易歙之分矣况墨說復指宣府之記為證用衆說從姓氏書之惟超起未嘗以奚稱則仍李氏不敢重出云李慥者易水諸李之祖也葉少藴云王景源使君所寶古墨一笏蓋其先待制所藏者背銘曰唐水部員外郎李慥製云諸李之祖也黎介然一見求以所用端石硯易之景源久之方與後携硯至行朝有貴人欲以五萬錢輟硯景源竟惜不與也江南黟歙之地有李廷圭墨尤佳廷圭本易水人其父超唐末流離渡江覩歙中可居造墨故有名焉今有得而藏於家者亦不下五六十年蓋膠敗而墨調也其堅如玉其文如犀寫踰數十幅不耗一二分也常侍徐公鉉為太簡言幼年嘗得李超墨一挺長不過尺細裁如筯與其弟鍇共用之日書不下五千字凡十年乃盡磨處邊際有刃可以裁紙自後用李氏墨無及此者超即廷圭之父也超墨有二品其面或為特龍者或曰新安香墨者其幕曰歙州李超造一上曰李超其號雖異亦互有精粗王仲薿曰其父岐公在仁宗朝被賜超墨題云檢校水部員外郎臣超後以遺蔡君謨君謨云超與其子廷圭唐末自易水渡江至歙州地多美松因而留居遂以墨名家本姓奚江南賜姓李氏超之墨世不復傳襄嘗侍羣玉宴輒賜得之其從子絛云昭陵晚歲開內宴數與大臣侍從從容談笑嘗親御飛白書以分賜更以香藥名墨遍賚焉一大臣得超墨而君謨伯父所得乃廷圭墨君謨時覺大臣意歉有不足色因密語能易之乎大臣者但知廷圭為貴而不知有超也既得易輒欣然及宴罷騎從出內門去將分道君謨於馬上始乃長揖曰還知廷圭是李超兒否超有弟起墨不𫝊子廷圭廷寬廷圭超之子世為南唐墨官蔡君謨云廷圭墨為天下第一品祥符治昭應用為染飾今人間所有皆其時餘物也其墨能削木誤墜溝中數月不壞昔年洛下為留守推官事王公見遺廷圭墨自是書笥中稍或益之漸至知墨之說尤為精微唐彥猷殊達此理超與圭始至新安各出姓名尚用邽字超死而圭業益精面有龍文而其名亦有用邽字者乃知名字不同形製有異者作之有先後也或曰何以知之曰類其父超也世之好竒者多借廷圭姓名模倣形製以造之有至好者茍非素蓄之家不能辨其墨雖厯數百年研磨尚有龍腦氣此其驗也王原叔性愛墨持玩不厭几案牀枕間往往置之常以柔物磨拭之發其光色至用衣袖略無所惜慶厯中有人持廷圭墨十丸求售從子參預托言草文字恐溷其思遽令麾去既而聞之極為嘆息其後尤難得而屢以萬錢市一丸其品乃有邽字作下邽之邽者為上作圭潔之圭者次之作圭璧之圭者又次之其云奚廷圭者最下蓋廷圭本燕人奚初姓後徙江南其初未竒久而益佳故李主寵其能賜之姓也雖名號有高下其間又自有精粗亦時有僞作者人多惑原叔言辨之當視其背印背印云歙州李廷圭墨歙傍缺字之左足與州字之中或其李字之中畫與子字之足貫又與庭字丰之竪畫墨字之右角貫視之上下相通者為真又自能造墨在濠梁彭門常走人取兖州善煤手自和揉妙為形體其光色與廷圭相上下既成均遺好事悉伏其精嘗以廷圭墨遺蔡君謨隴西李之殉謁之曰聞以墨遺君謨槖中必缺今請以一丸補之蘇魏公云高祖以來所用廷圭墨一挺於祖父寶之長四寸濶一寸厚一寸其色之黑世無物及者研之無聲面有李廷圭墨四字蘇子瞻為顔鳬繹作集引其子復以廷圭墨遺之金塗龍及銘云李憲臣所屬賜墨也又嘗以蜀中冷金箋試墨惟廷圭乃黑陳無己云朝無斁有李墨半丸云是裕陵故物也往於秦少游家見李墨不為文理質如金石亦裕陵所賜王平甫所藏者其子斿以遺少游潘谷見之載拜云真廷圭所作也世惟王四學士有之與此為二矣吳幵喜蓄墨收古今名品甚具諸李所製皆有之云皆無出廷圭之右者其堅利可以削木書華嚴經一部半用廷圭才研一寸其下帙用承晏墨遂至二寸則膠法可知矣王彥若云趙韓王從太祖至洛行故宫見架間一篋取視之皆李氏父子所製墨也因盡以賜王後王之子婦蓐中血暈危甚醫求古墨為藥因取一枚投烈火中研末酒服即愈諸子欲各偹産乳之用乃盡取墨煆而分之自是李氏墨世益少得邵公濟云太祖下南唐所得廷圭父子墨同俘獲物付主藏吏籍收不以為貴也後有司更作相國寺門樓詔用黑漆取墨於主藏車載以給皆廷圭父子之墨至宣和年黃金可得李氏之墨不可得熙寧間李舜舉御藥為林子中言禁中墨無廷圭成挺者但有承晏文用等墨為古墨之尤者握子有香字乃廷圭禁中尤珍之吾家太史云國初平江南時廷圭墨連載數艘輸入內庫太宗賜近臣祕閣帖皆用此墨其後建玉清昭應宫至用以供漆飾而太史所記與蔡邵二說互有同異故並載之廷圭子承浩蚤世故墨不多有其後遂絶友平生凡五見廷圭墨其一見之於京師楊好謙家面作柳枝瘦龍上印一小香字幕曰徽州李廷圭墨黃羅囊襲之表以牙籖曰仁宗皇帝寶字墨其一見之於黃可玉清權齊云是其外家宣和進士陳篆所藏其一唐子真得於趙氏姑脂澤中銘曰保大元年歙州進墨務官臣李廷圭造後截留保大二字易帖於莊肅幼恭其一半挺見之於鍳書博士柯敬仲家銘曰保大元年正月七日奉旨造幕曰𢎞文館供奉庫左行書云墨務官臣廷圭右行書云墨務官臣廷寬其一見之於洛陽趙顔子之孫許面作特龍幕曰保大九年奉敕造長春殿供御龍印香煤左行書云墨務官臣廷邽監官臣亮右行書云臣夷中臣子和臣卞等進試之皆光澤如新獨寶字墨質雖具而膠法已敗疑為蘇家贋物也廷寬超之次子蔡君謨云李超并男廷寬墨今少見廷圭為第一廷寬承晏次之又云欲求廷圭墨終難得或廷寬承晏文用皆其家法子承晏承晏子文用文用子仲宣仲宣子惟益惟慶承晏廷寬之子蔡君謨云李氏墨承晏而下不能用家法無足取者熙寧九年蘇魏公頌同修國史開局日賜承晏笏挺雙脊龍墨張遇丸墨澄心堂紙及對神宗曰禁中自此少矣宜寶之蘇子瞻云黃魯直學吾書輒以書名於時好事者爭以精紙妙墨求字常攜古錦袋滿中皆是物者一日見過探之得承晏墨半挺遂奪之潘谷驗墨摸索便知精粗一日過魯直取所藏墨示之谷隔錦囊揣之曰此李承晏軟劑今不易得又揣其一曰此谷草年造者今精力不及無此墨也取視果然文用承晏之子能世其業然墨差不逮絶無有也仲宣文用之子亦如其父陳無己云南唐於饒置墨務李本奚氏以幸賜國姓世為墨官云唐之問質肅公之子有墨曰饒州供進墨務官李仲宣造世莫知其何人頗有家法以遺黃魯直魯直謂不逮孫氏所有而無己謂過之陳留孫待制家有墨半挺號稱廷圭但色重耳非古製也惟益仲宣之子葉少藴云元祐初京師雜買務貨舊墨猶有惟益所作千餘挺當時士大夫爭取之背印作歙州墨務官李惟益造者是也弟惟慶惟慶仲宣次子其墨小挺子優於大墨可亞廷圭一種有兩頭圜面有雙龍奉一牌子曰供灑龍麝香墨幕文曰歙州李惟慶墨者上品也江南畏中國之威其供御字並刻為供灑一種面印皆同幕文曰歙州供進墨務官李惟慶造者其次也此後李氏遂無聞宋仁宗時其子孫尚有為務官者歲貢上方絶不佳每移文本州責之殊不入用也張遇易水人遇墨有題光啓年者妙不減廷圭宫中取其墨燒去烟用以畫睂謂之畫睂墨蔡君謨謂世以歙州李廷圭為第一易水張遇為第二遇亦有二品易水貢墨為上供堂墨次之蘇子瞻云麝香張遇墨兩枚或自內廷得之以見遺藏之久矣製作精緻非常墨所能髣佛陳無己見秦少游有張遇墨一圑面為盤龍鱗鬛悉具其妙如畫其背有張遇麝香四字語曰良玉不琢謂其不借美於外也張其後乎墨經云凡印方直最難往往多裂易水張遇印多方直者其劑熟可知葉少藴云兩漢間稱墨多言丸魏晉後始稱螺取其上鋭必稍如今之挺形而丸則其製不可解或云乃今之錢子墨世𫝊張遇墨乃唐末時物皆為錢子是其遺法然極不便於研磨古人為之當别有意也子谷谷製墨得李氏法而世不多有鄒志完謂遇之子名谷然云黟川布衣則疑别有同姓名者又以處厚亦云黃山意其自易水徙歙如李氏故漫從家世書之子處厚處厚在黃山起竈作煤製墨為世業其用逺烟魚膠鄒志完云豫用處厚墨久矣而未之識一旦處厚踵門問其家世則谷之子遇之孫昔李氏以墨顯於江南而遇妙得其法至處厚益恐墜其家聲不汲汲於利尤可尚也朱逄歙州人江南韓熙載自延其造化松堂墨文曰𤣥中子又曰麝香月匣而寶之雖至親昵友無見之者熙載死後盡為諸妓分攜而去墨史卷上
