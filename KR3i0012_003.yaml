body:
  text: 墨史卷下元陸友撰宋戴彥衡新安人紹興間復古供御墨蓋彥衡所造自禁中降出雙角龍文或云米友仁侍郎所畫也中官欲於苑中作墨竈取西湖九里松作煤彥衡力持不可曰松當用黃山所産此平地松豈可用人重其有守新安志云彥衡自紹興八年以薦作復古殿等墨其初降雙脊龍樣是米元暉所畫繼作圭璧及戲虎樣時議欲就禁苑為窑稍取九里松為之彥衡以松生道傍平地不可用其後衢池工載它山松往造亦竟不成彥衡常出貢餘一圭示米公米公以為少有其比蒲大韶閬中人得墨法於黃魯直所製精甚東南士大夫喜用之嘗有中貴人持以進御高宗方留意翰墨視題字曰錦屏蒲舜美問何人中貴人答曰蜀墨工蒲大韶之字也即擲於地曰一墨工而敢妄作名字可罪也遂不復內自是印識即言姓名云大韶死子知微傳其法與同郡史威皆著名夔帥韓球令造數千斤愆期不能就遣人逮之舟覆江中二工皆死所售者皆其族人及役作竊大韶以自貴之何子楚云近世所用蒲大韶墨蓋油煙墨也後見續仲永言紹興初同中貴鄭幾仁撫諭吳少師玠於仙人關回舟自涪陵來大韶儒服手刺就船來謁因問油煙墨何得如是之堅大也大韶云亦半以松煙和之不爾則不得經久也又周昭禮云大韶涪州樂溫人聓文子安梁杲渠州人皆世業此梁膠法精而價直昻蒲粗而損梁直大半出蜀者利其亷攜以來者皆蒲墨也雖均名川墨而工製異外有幸垕又居蒲下其家無人杲有子思溫紹其業蒲序字中庠隱居涪陵作墨名世不為外飾其法用鹿膠和劑極清有光暈然著濕氣輒皴起漆之則不復畏濕曽見序墨一笏於大梁張君錫家面銘曰荆璞幕曰黃耳金鉉下云墨隱蒲序製或云在廷圭前序宋渡江時尚存其後有蒲雲蒲彥輝蒲廷璋皆其族人也郭彬不知何許人米元暉嘗命其製墨銘曰山齋王湍以善墨名嘗為葉少藴言物性相制固有不可知者今或急於磨墨而沫起殆纒筆不可作字但取耳中塞一粟許投之不過一再磨即不復見少藴試之果然趙令襟字表之宋宗室封安定郡王子子覺嗣子覺字彥先幼俊敏有文世授墨法手自製銘曰雪齋為世所貴得之者價比金玉彥先有子十四人仕皆通顯惟伯鹿傳其膠法最精銘曰超然清芬如在超然表之自稱也世言李氏對膠之妙彥先以謂非特堅鈍難磨且終不能黑其法用煤六分膠四分始為中度但取煙貴輕杵和貴勻熟耳煎膠以麋鹿角為上驢膠次之阿井膠又次之至其要訣又非人所能知也吳滋新安人滋家世藏汪彥章帖云吳滋作墨新有能聲紹興庚申於新安郡齋授以對膠法試之當見其佳孝宗在東宫以滋所造甚佳例外犒緡錢二萬其法取松煙擇良膠對以杵力故滓不留硯李司農若虛云新安出墨舊矣唯李超父子擅名近日墨工尤多士大夫獨稱吳滋使精意為之不求厚利駸駸及前人矣滋領其言云何南翔遂寧人以墨知名張魏公留守建康日以書至蜀取南翔所製墨王晦叔為銘其面曰立言追聖學籌筆活蒼生胡景純潭州人専取桐油燒煙名曰桐華煙其製甚堅薄不為外飾以眩俗眼大者不過數寸小者圜如錢大每磨研間其光可鑑畫工寶之以點目瞳子如點漆李彥頴云長沙多墨工唯胡氏墨千金獺髓者最著州之大街之西安業坊有煙墨上下巷永豐坊有煙墨上巷今有鄭子儀自謂得胡氏法俊臣俗名為胡院子世英友直國瑞沛然文中皆景純子孫俱世其業云葉谷永嘉人作油煙墨與潭州胡景純相上下而膠不及李世英紹興中在吳秦王益府治墨一日王為世英進墨入內率一圭重十兩高宗見其墨挺厚大難執遂不御而還之其銘為藂桂堂李世英造者特佳子克恭華邦憲孝宗朝供御造墨其一面曰選德殿製淳熙癸卯臣華邦憲造幕有特龍如畫侯璋汳人石憲蕭鳯長沙人彭雲彭紹張桷瀘人姚孟明李英才廬陵人杜大椿張楚材朱鼎臣陳中正已上十二人咸精其藝淳熙以來士大夫喜用其墨視前代無愧矣葉世英閩中人周子充玉堂雜記云丁酉十一月壬寅內直宣召至清華閣既退中使傳旨賜世英墨五團世英御前墨工也弟世傑郭忠厚以墨名家忠厚子玘玘子喜忠厚墨至今尚有麝氣其面為雙脊龍文幕曰嘉定己卯臣郭忠厚造會稽王宣子家藏玘墨一挺銘曰復古殿製端平乙未臣郭玘造胡智新安人李司農云智得李氏墨法其聓陳琦宗婦翁之法不求速售故世少知者司農寓居新安物色其人使之造墨猶有昔人典刑楊振字聲伯長興人武舉得官蓄古墨最富多精品故所製不下趙彥先朱知常銘曰朱知常墨不下蒲史黃元功詹從之諸葛武仲周達先樊宗亮已上五人並居太末傳趙彥先墨法頗異常品劉忠恕吳中人家有墨一挺形製甚大止曰劉忠恕三字紋理剝落試之色澤如新劉文通子士先端平間供御墨工葉茂實太末人善製墨周公瑾言其先君明叔佐郡日嘗令茂實造軟帳煙尤輕逺其法用暖閣羃之以紙帳約高八九尺其下用碗貯油炷燈煙直至頂其膠法甚竒內紫礦秦皮木賊草當歸腦子之類皆治膠之藥蓋膠不治則滯而不清故其墨雖經久或色差淡而無膠滯之患楊伯起者以墨稱其言取煙欲浮而輕膠欲老而澄均調揉治不失其齊量然後墨成雖然是直其粗耳至若心解神悟超然法度之外吾亦不能評也俞林善慶殿供御墨工頃在淮南見墨一笏幕作雲龍文面曰俞林邱攽共製香墨攽不知何人李果徐禧戴溶謝東黃表之潘士衡潘士龍楊逢辰廬陵人葉子震柴德言周朝式張公明孫永清朱仲益林杲字東卿舒泰之舒天瑞陳伯升天台人陳道真鄭宣方文龍項應珍范厚叔翁壽卿王大用翁彥卿周伯起墨名為齊峯者已上二十七人並宋末名手如舒泰之翁彥卿皆嘗供御造墨其形製少精而多粗殊不逮前人豈一物之微亦與世髙下蓋松煙之法久絶故劉葉之徒専尚油煙油煙宜簡版不宜紙也金劉法字彥矩常山人善博物自製墨數品銘曰棲神岩造者佳品也楊邦基為畫墨史圖一曰入山二曰起竈三曰採松四曰發火五曰取煤六曰烹膠七曰和劑八曰成造九曰入灰治刷十曰磨試彥矩云初無入山磨試二事而成造入灰出灰治刷本四事楊合為二復增入山磨試總成十圖云楊文秀字伯達本江左人在金之季以墨善聞其法不用松炬而用鐙煤子彬得其遺法以授耶律楚材楚材授子鑄使造一萬丸銘曰玉泉萬笏高麗高麗貢墨猛州為上須州次之舊作大挺不善合膠脆軟不光後稍得膠法作小挺差勝然其煙極輕細往時潘谷嘗取高麗墨再杵入膠遂為絶等其墨有曰平敵城進貢者有曰順州貢墨或曰猛州貢墨率長挺而堅薄如革校其色澤則順不逮猛也李公擇嘗惠蘇子瞻墨半枚其印文曰張力剛豈墨匠姓名耶云得之高麗使者魏道輔云新羅墨有蠅飲其汁蠅立死不知何毒之如是也後常戒人合藥勿用新羅墨日本亦有墨遍肌印文如柿蒂形契丹陸子履奉使契丹日得墨銘曰陽岩鎮造者其國精品也滕子濟亦有墨一大笏為龍鳯之文面曰鎮庫萬年不毁西域西域僧為蘇太簡言彼國無硯筆但有好墨中國不及云是雞足山古松為之太簡嘗獲貝葉上有梵字數百墨倍光澤會秋霖為窗雨濕因而揩之字終不滅雜記説文云墨書墨也從黑從土墨者煙煤所成土之類也釋名曰墨者晦也言似物晦黑也漢書尚書令僕丞郎月賜隃麋大墨一枚小墨一枚漢中官令主御筆墨東宫故事皇太子初拜給香墨四丸東觀漢記曰和熹鄧后即位萬國貢獻悉禁絶惟歲時供紙墨而已揚雄詔令尚書賜筆墨觀書石室汲太子妻與夫書曰并致上書墨十螺魏官儀云尚書郎缺試諸郎故孝亷能文案者先試一日宿召會都坐給筆墨以奏陸士龍遺兄士衡書云上三臺曹公藏石墨數十萬斤云燒此復消可用然煙中人不知兄頗見之不今送二螺大業拾遺記宫人以蛾緑畫睂疑亦石墨之類近世無復此物沈存中括帥鄜延界內有石油然之煙甚濃其煤可為墨黑光如漆松煙不及其識文為延安石液者是也晉令治書令史掌威儀禁令領受寫書縑帛筆墨陶侃獻晉帝箋紙三千枚墨二十丸皆極精妙墨藪云凡書先取墨必廬山之松煙代郡之鹿角膠十年已上強如石者妙南朝以墨為螺為量為丸為枚陸士龍與兄書送墨二螺梁科律御墨一量十二丸漢官儀令僕丞賜墨一枚歐陽通每書其墨必古松之煙末以麝香方可下筆唐元宗御案墨曰龍香劑一日見墨上有小道士如蠅而行上叱之即呼萬歲曰臣乃墨精黑松使者也凡世人有文者其墨上皆有龍賓十二上神之乃以墨分賜掌文官盧杞與馮盛相遇於道各攜一囊杞發盛囊有墨一枚杞大笑盛曰天峯煤和針魚腦入金溪子手中録離騷古本如公只提綾紋刺三百為名利奴顧當孰勝許足有妙墨八櫉巢賊亂瘞於善和里第事平取之墨已不見惟石蓮匣存成老相墨經曰墨紋如履皮磨之有油暈者一兩得染三萬筆又云墨染紙三年字不能昏暗者上凡墨日日用之一歲才減半寸者萬金不換文房寶飾曰養墨以豹皮囊貴乎逺濕徐鼎臣兄弟工染翰飾書具嘗出一月團墨曰此價直三萬錢江左士人好事無及之者世言蜀中冷金箋最難為筆非也惟此紙難為墨蘇子瞻嘗以此紙試墨惟李廷圭乃黑今之小學者將書必先安神養氣存想字形在眼前然後以左手研墨墨調手穩方書則不失體也又云研墨如病蓋重其調勻而不泥也又云研墨要涼涼則生光墨不宜熱熱則生沫蓋忌其研急而墨熱又李陽冰云用則旋研無令停久久則塵埃相汙膠力隳亡如此泥鈍不任下筆矣沈存中云南方暑雨時墨惡蒸溽可置暖閣中其法不宜垜砌以梓木匣貯之梅月微令近火但要如人體溫不必太熱歲久膠性乾透漸自不蒸善墨雖蒸不壞不善者雖焙亦蒸全在製作不問蒸也墨經云凡墨擊之以辨其聲醇煙之墨其聲清響雜煙之墨其聲重滯若研之以辨其聲細墨之聲膩粗墨之聲粗粗謂之打硯膩謂之潤硯凡研直研為上直研乃見真色不損墨若圜研磨則假借重勢往來有風以助顔色乃非墨之真色也沙門惠洪云司馬君實無所嗜獨好蓄墨數百斤或以為言君實曰吾欲子孫知吾所用此物何為也蘇子曕有佳墨七十丸而猶求取不已石昌言蓄李廷圭墨不許人磨或曰子不磨墨墨將磨子李公擇見墨輒奪相知間鈔取殆盡吕行甫平生好藏墨士大夫戲之為墨顛又如滕達道蘇浩然暇日晴暖輒研墨水數合弄筆之餘則啜飲之唐彥猷清簡寡欲不以世務為意公退一室蕭然臨書試墨以此度日墨史卷下
