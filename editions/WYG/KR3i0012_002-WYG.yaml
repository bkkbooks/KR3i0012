body:
  text: 墨史卷中元陸友撰宋柴珣宋初時人代居宣城得二李膠法出潘張之上其作玉梭様銘曰柴珣東窯者士大夫得之葢金玉比也其後有柴成務朱君德二人墨並狹小挺制作不一陳贇易水人世𫝊不多與張遇等其墨銘曰易水光真墨幕曰陳贇陳朗兖州人宋初避諱因以三翁記之蔡君謨評墨以李廷珪為第一廷寛承晏次之張遇次之朗又次之不獨造作有法松烟自異君謨得歙烟造墨便有廷珪風采乃知本性隨其土地而異朗弟逺逺子惟進楊如晦云歙州諸李稍喜出光而東山諸陳作一色皴面皴面便於研試葢墨色皴闇磨之倍増光黒為鬻者之利爾大體入池蚤作細文入池遲作皴文無他術也欲皮汎逾細而光當出池時揩刷令净以皮一番蘸水受之則應手如角皮汎墨家言也陳已陳湘陳相陳和陳顯已上五人皆朗諸孫膠法雖在而妙處似非其子孫可傳故墨不逮昔人已墨名為飛魚鎚子相墨所謂墨龍髓者銘曰世業陳相逺烟清光劉貢父作墨作長新字長新陳相也墨經云兖人舊以十月煎膠十一月造墨今旋煎旋用殊失之故潘谷一見相墨曰惜哉一生膠耳景煥成都人隠居玉壘山嘗得墨材甚精止造五十團不復更作曰以此終吾身墨印文曰香璧幕曰副墨子煥有文藝撰野人閒話牧豎閒談及畫蹟傳於代盛匡道盛通盛真盛舟盛信盛皓已上六人皆宣州一族大率如奚廷珪樣幕並篆文依歙様香墨唯通墨挺大而與諸盛小異宣道或曰宣德不知何許人墨皆範張遇即未究郡國之來姓名之出李伯陽以其形製俱類廷珪疑歙州人也姜潛字至之兖州人隠居奉符之太平鎮文潞公通判州事日訪墨於姜姜曰近頗難得當求佳煤自製久之攜紙囊訪公曰此即煤也寫之則盈盤按之則如故又曰此亦可以如茶啜之無害公如其言啜一茶甌食頃忽發欬聲香氣上襲芳馥如麝姜曰此所謂麝煤也研麝入者傳之誤矣墨成頗珍惜之周明法林鑑陳泰已上並兖州名手作墨其得意者皆不減諸陳但尚新耳王迪西洛隠君子也其墨法止用逺烟鹿膠二物銑澤出陳贍之右文潞公嘗從迪求墨久之持烟一奩見公且請以指起烟按亦隨復曰此烟之最輕者乃抄烟以湯㵸起揖公對啜云當自有龍麝氣真烟香也凡墨入龍麝皆奪烟香而引蒸濕返為墨病俗子不知也黄太史以迪為鎮州人而家於洛也耿仁遂歙州人仁遂子文政文壽而耿盛耿德真皆其世家德真所製甚精惜其蚤死藏墨之家不及見也王順兖海人徂徠獨稱諸陳順晩出而其法尤精常言墨貴輕清葢烟逺則輕膠逺則清墨家昧此多肧闇乏堅緻非善法也如李廷珪真墨堅如角石年逾多而光采如新斜斫薄處可以刻紙或云廷珪佳煤一斤可受膠一斤入手堅重研不滯筆此所以獨貴於世也楊如晦謂順墨稍堅重有光雖濃磨不留筆似得廷珪妙處裴言元祐中為曹王造墨故料精而墨善比常品差勝郭玉汲人玉所製墨銘曰供御郭玉潘谷伊洛間墨師也墨既精好而價不二士或不持錢留劵取墨亦輒與之蘇子瞻聞之曰非市道人也嘗與詩云一朝入海尋李白空看人間畫墨仙豫章黄魯直嘗得李廷珪墨神宗所賜王安國平甫者已而遺淮海秦少游少游愛之藏錦囊中墨師過少游少游出錦囊以示之墨師手拊錦囊即拜曰真廷珪為者疇昔見於平甫家與此二矣是豈常墨工所能哉後忽取積劵焚之飲酒三日發狂浪走赴井死人下視之葢趺坐井之中尚持念珠也谷子遇陳無己云供偹使李唐卿嘉祐中以書待詔者也喜墨嘗謂余曰和墨用麝欲其香有損於墨而竟亦不能香也不若並藏以熏之潘谷墨香徹肌骨磨研至盡而香不衰陳惟進之墨一篋十年而麝氣不入但自作松香耳葢陳墨膚理堅宻不受外薫潘墨之香劑中必入龍麝等也東野暉兖人也蘇子瞻云暉所製墨每枚必十千信非凡墨之比也蘇澥字浩然武功人度支郎中舜元之子為秘閣校理自號支離居士喜造墨所製皆作松紋縐皮而堅緻如玉石何子楚與其孫之南仲容游其家藏不過數笏子楚得半笏於李漢臣持視仲容曰真家寶也神宗朝髙麗入貢奏乞浩然墨詔取其家浩然止以十笏進呈其自珎秘如此人有獲其寸許者如㫁金碎玉争相誇玩黄魯直所謂廷珪贋墨出蘇家者是浩然所作也晁貫之字季一性無他嗜獨見墨丸喜動睂宇其所製銘曰晁季一寄寂軒造者不減潘陳其兄說之字以道深於名理尤喜造墨著墨經三卷論産松之地烟煤製造之法及自古墨工知名者凡三篇朱覲九華人善用膠作軟劑出光墨滕元發作郡日令其手製銘曰愛山堂造者最佳子聰不逮其父僧清一蜀人也遇異人傳墨法有名江淮間甚貴重之張居靖善造墨黄魯直試之謂其鹿膠極堅黒作皮肉不減曩時歙州煤其光澤不足良以歲月深逺爽調䕶耳陳贍真定人初造墨遇異人傳和膠法因就山中松取煤其用膠雖不及常和沈珪而置之濕潤初不蒸敗此其妙處也又受異人之教每觔半觔價雖廉而利常贏餘何子楚嘗以二萬錢就贍取墨適非造墨時因返金而以斷裂不全者二十笏為寄曰此因膠緊所致非深於墨不敢為獻也子楚寳而用之并就真定公庫轉置百笏自謂終身享之不盡南渡一掃無餘繼訪好事所藏葢一二見也贍在宣和間已自貴重觔直五萬比其身在葢百倍矣贍死壻董仲淵因其法而加膠墨尤堅緻恨其即死流𫝊不多也董後有張順亦贍壻而所製不及淵亦失贍法又有胡德者贍之外孫也劉寧真定墨工也與同郡張順各尊其藝素不相下康倬為章使之造墨但多以錢遺之不問所造之多寡故嘗得佳品宣和乙巳春為章赴官鄚亭將行二人皆以墨獻張力言其墨勝劉劉云無多言得以試之耳取二湯壺熾炭熬之使沸各投墨一笏煮之自巳及酉取視之張墨已融敗拆裂劉墨堅如故叩之琅然張乃大服劉曰二煤與膠皆一所以異者萬杵耳常和隠居嵩山墨雖晩出頗自珍惜膠法殊精必得佳煤然後造故其價與潘陳特高收其贏以起三清殿其銘曰紫霄峰造者歲久磨滅真可截紙和子遇不為五百年後名而減膠售俗正如江南徐熙作落墨花而子崇嗣取悦俗眼而作沒骨花敗其家法也解子誠河東人韓偉昇已上二人墨挺極重厚膠力不乏其精采可與新製敵也田守元一名守真其墨式形製極精而煤不甚佳差勝小潘然亦多沙耳梅鼎張孜關珪弟瑱曹知微陳昱郭遇明梅贍張雅高肩已上十人並崇寧以來京師名手皆有聲稱而精於樣製侍其瑛本良家子少年流宕京師元豐中以筆為業入太學供諸生甚勤不計其直輒與之率日至或二三日一至自爾稍稍受知當世公卿大夫遂以筆名家其後造墨和劑制樣稍佳而膠法未精不復取重於人李清上黨人以墨著名鄭涓在重和中造墨銘曰凝香閣者張達明試之謂不媿李氏薛安薛容少室人容所造墨用竈君山煤真竒品也張滋真定人善和墨色光黳膠法精舉勝江南名手大觀初時學士彦許八座光凝共薦之於是命造墨入大觀庫是後歲歲加賜錢至二三萬政和末蔡京罷相而後止焉滋亦能自重方其得聲價時景越二王呼滋至邸命出墨謂雖百金弗吝也滋不肯曰滋非為利者今墨乃朝廷之命不敢私遺人二王乃丐於上詔各賜王十觔然滋所造實超今古其墨積大觀庫毋慮數萬觔世有宣和睿製者葢滋所作也張浩唐州人居桐栢山其墨精緻膠法甚竒呉順圖於每歲造至百觔遂壓京都之作矣王惟清丁真一已上二人隠居吴郡皆能製墨尤為米元章所賞識高慶和歙人也大觀間葉少藴令慶和造墨取煤於黄山不復計直葢以松漬漆並燒又嘗館三韓使人得其貢墨碎之㕘以三之一既成潘張之徒皆不及同時有汪通高景修皆起竈作煤製墨為世業潘衡金華人蘇子瞻云衡初來儋耳起竈作墨得烟豐而墨不甚精因教其逺突寛籠得烟幾減半而墨乃爾黑其文曰海南松煤東坡墨法皆精者也常當防墨工盜用印使得墨者疑衡此墨出灰池中未五日而色如此日久膠定當不減李廷珪張遇也子瞻自儋耳歸至廣州舟敗亡墨四篋平生所寶皆盡僅於諸子處得李墨一丸潘谷墨兩丸自是至毘陵捐館舍所用皆此三墨也葉少藴云宣和初有潘衡者賣墨江西自言嘗為東坡造墨海上得其秘法故人争趨之余因問東坡之子過求其法過大笑曰先人安得有法在儋耳衡適來見因使之别室為煤夜遺火幾焚廬翌日煨燼中得煤數兩而無膠法取牛皮膠以意和之不能為挺磊塊僅如指者數十公亦絶倒衡因謝去葢自别得法借東坡以行也天下事名實相蒙類如此東坡乃以善墨聞耶衡今在錢塘竟以東坡故售墨價數倍於前然衡墨自佳亦由墨以得名尤用功可與九華朱覲上下也有女居廬陵𫝊其業孫秉彛墨銘為金華潘衡嫡孫秉彛者是也潘昱善造墨范至能謂二王府帖是昱墨所摹拓友按黄魯直云元祐中親賢宅從禁中借版刻法帖墨百本分遺宫僚但用潘谷墨光輝有餘而不甚黟黒又多木横裂文士大夫不能别也至能號稱博洽而昱之名不同疑𫝊聞之悮耳沈珪嘉禾人初因販繒往來黄山有教之為墨者以意用膠一出便有聲稱後又出意取古松煤雜松脂漆滓燒之得烟極精細名為漆烟每云韋仲將法止用五兩之膠至李氏渡江始用對膠而秘不傳為可恨一日與張處厚於居彦實家造墨而出灰池失於早墨皆斷裂彦實以所用墨料精佳惜不忍棄遂蒸浸以出故膠再以新膠和之墨成其堅如石珪因悟對膠法每視烟料而煎膠膠成和煤無一滴多寡也故其墨銘云沈珪對膠十年如石一㸃如漆此最佳者也其為人有信義庚子冦亂何子楚避地嘉禾連墻而居日為子楚言膠法并觀其手製雖得其大槩至微妙處雖其子晏亦不能傳也珪年七十餘終晏先卒其法遂絶時有張孜墨校珪漆烟而勝者珪曰非此敵也乃取篋中先減膠一丸與孜墨並而孜墨返出其下逺甚子楚叩之云廷珪對膠於百年外方見勝妙葢雖精烟膠多則色為膠所蔽逮年逺膠力漸退而墨色始見耳若孜墨急於目前之售故用膠不多而烟黒不昧若歲久膠盡則脫然無光如土炭耳孜墨用宜西北若入二浙一遇梅潤則敗矣滕令嘏監嘉禾酒税延致珪甚厚令盡其藝既成取小團磨試忽失所在後二年濬池得之其堅緻如故令嘏莊敏公之子所蓄古墨至多而有鑒裁謂珪曰幸多自愛雖二李不能逺過也大觀間劉無言取蘇浩然製銘令沈珪作數百丸以遺好事及當朝貴人所藏未必皆浩然手製然珪作墨亦非近世墨工可及實可亂真也葉少藴每勸人多蓄珪墨珪死後方知其可貴也僧仲球融州人世傳李氏膠法在都嶠山中為朱儀相作墨銘曰學易堂者是也墨史卷中
