body:
  text: 墨史譜錄類一器物之屬提要臣等謹案墨史三卷元陸友撰友字友仁吳縣人其書集古來精於製墨者攷其事蹟勒為一書於魏得韋誕一人於晉得張金一人於劉宋得張永一人於唐得李陽冰以下十九人於宋得柴珣以下一百三十餘人於金得劉法楊文秀二人又詳載高麗契丹西域之墨附録雜記二十五則皆墨之典故也其間蒐羅隠僻博贍可觀大率采自宋人説部者居多雖其出處不能盡詳而薈稡成編實可為文房故事之助其論奚廷珪非李廷珪一條據墨經載易水奚鼐之子超鼏之子起又别叙歙州李超超子廷珪以下世家是族有奚李之異居有易歙之分惟其名偶同足破世所傳江南賜姓李氏之説為妄亦頗有資於考據案禆傳載友仁生市㕓闤闠間父以市布為業獨能異其所好攻苦於學善為歌詩工八分隷楷博極羣物奎章閣鍳書博士柯九思侍書學士虞集服其精識相與言於文宗未及任用而二人去職友亦南歸自號硯北生著硯史墨史印史所為詩文有杞菊軒藁今皆亡佚惟研北雜志及是書尚存云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:6bc3bf85bb0ff289c013c8f4da27f57974369c13c1342588e9acf4ea5e3ae952
